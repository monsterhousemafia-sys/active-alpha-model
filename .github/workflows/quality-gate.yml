name: Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements_active_alpha.txt
      - name: Run quality gate
        run: python tools/run_quality_gate.py
